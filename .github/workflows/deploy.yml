name: Deploy (staging)

# Every push to main (i.e. an approved PR merged) builds the site and deploys it to the
# staging alias. Staging is the integration tier / release candidate. PR previews go to the
# dev alias before merge (preview-dev.yml); production is a gated release (release.yml ->
# deploy-production.yml).
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to staging
        run: npx wrangler pages deploy dist --project-name revive-web --branch staging
